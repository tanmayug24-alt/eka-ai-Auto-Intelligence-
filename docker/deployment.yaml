apiVersion: apps/v1
kind: Deployment
metadata:
  name: eka-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eka-ai
  template:
    metadata:
      labels:
        app: eka-ai
    spec:
      containers:
      - name: app
        image: eka-ai:latest
        ports:
        - containerPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eka-ai-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eka-ai
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
