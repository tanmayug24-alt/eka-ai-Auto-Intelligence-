<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background-color: #f3f4f6;
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    }

    }

    .animate-spin {
      animation: spin-slow 1s linear infinite;
    }
  </style>
</head>
<body>
  <!-- Root element for React app -->
  <div id="root"></div>

  <!-- Main React application -->
  <script type="module">
    // Import statements will be handled by build tool

    import ReactDOM from '/@fs//workspaces/eka-ai-Auto-Intelligence-/node_modules/react-dom/index.js';
